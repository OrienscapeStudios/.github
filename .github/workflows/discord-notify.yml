name: Discord Commit Notification

on:
  push:
    branches:
      - '**'  # Trigger di semua branch

jobs:
  notify-discord:
    name: Send Discord Notification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get commit info
        id: commit_info
        run: |
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | wc -l || echo "1")
          BRANCH="${{ github.ref_name }}"
          REPO_NAME="${{ github.event.repository.name }}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${COMMIT_SHA}"
          COMPARE_URL="${{ github.server_url }}/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}"

          if [[ "$BRANCH" == "master" ]]; then
            COLOR=5763719
          elif [[ "$BRANCH" == "dev" ]]; then
            COLOR=3447003
          elif [[ "$BRANCH" == release/* ]]; then
            COLOR=15105570
          elif [[ "$BRANCH" == hotfix/* ]]; then
            COLOR=15548997
          else
            COLOR=10070709
          fi

          echo "commit_short=$COMMIT_SHORT" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "commit_author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "commit_url=$COMMIT_URL" >> $GITHUB_OUTPUT
          echo "compare_url=$COMPARE_URL" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Menggunakan jq untuk merakit JSON agar karakter spesial otomatis di-escape
          PAYLOAD=$(jq -n \
            --arg repo_name "${{ steps.commit_info.outputs.repo_name }}" \
            --arg commit_url "${{ steps.commit_info.outputs.commit_url }}" \
            --arg color "${{ steps.commit_info.outputs.color }}" \
            --arg commit_msg "\`\`\`${{ steps.commit_info.outputs.commit_msg }}\`\`\`" \
            --arg branch "\`${{ steps.commit_info.outputs.branch }}\`" \
            --arg commit_short "[\`${{ steps.commit_info.outputs.commit_short }}\`](${{ steps.commit_info.outputs.commit_url }})" \
            --arg files_changed "\`${{ steps.commit_info.outputs.files_changed }} file(s)\`" \
            --arg author "${{ steps.commit_info.outputs.commit_author }}" \
            --arg compare "[View Diff](${{ steps.commit_info.outputs.compare_url }})" \
            --arg footer "GitHub Actions • ${{ github.repository }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              "username": "GitHub Notifier",
              "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "embeds": [{
                "title": $repo_name,
                "url": $commit_url,
                "color": ($color | tonumber),
                "description": $commit_msg,
                "fields": [
                  { "name": "🌿 Branch", "value": $branch, "inline": true },
                  { "name": "📝 Commit", "value": $commit_short, "inline": true },
                  { "name": "📁 Files Changed", "value": $files_changed, "inline": true },
                  { "name": "👤 Author", "value": $author, "inline": true },
                  { "name": "🔗 Compare", "value": $compare, "inline": true }
                ],
                "footer": { "text": $footer },
                "timestamp": $timestamp
              }]
            }')

          HTTP_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          if [ "$HTTP_RESPONSE" -eq 204 ]; then
            echo "✅ Discord notification sent!"
          else
            echo "❌ Failed. HTTP: $HTTP_RESPONSE"
            echo "📝 Debug Payload: $PAYLOAD" # Membantu melihat JSON yang gagal terkirim
            exit 1
          fi

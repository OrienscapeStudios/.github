- name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Menggunakan jq untuk merakit JSON agar karakter spesial otomatis di-escape
          PAYLOAD=$(jq -n \
            --arg repo_name "${{ steps.commit_info.outputs.repo_name }}" \
            --arg commit_url "${{ steps.commit_info.outputs.commit_url }}" \
            --arg color "${{ steps.commit_info.outputs.color }}" \
            --arg commit_msg "\`\`\`${{ steps.commit_info.outputs.commit_msg }}\`\`\`" \
            --arg branch "\`${{ steps.commit_info.outputs.branch }}\`" \
            --arg commit_short "[\`${{ steps.commit_info.outputs.commit_short }}\`](${{ steps.commit_info.outputs.commit_url }})" \
            --arg files_changed "\`${{ steps.commit_info.outputs.files_changed }} file(s)\`" \
            --arg author "${{ steps.commit_info.outputs.commit_author }}" \
            --arg compare "[View Diff](${{ steps.commit_info.outputs.compare_url }})" \
            --arg footer "GitHub Actions • ${{ github.repository }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              "username": "GitHub Notifier",
              "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "embeds": [{
                "title": $repo_name,
                "url": $commit_url,
                "color": ($color | tonumber),
                "description": $commit_msg,
                "fields": [
                  { "name": "🌿 Branch", "value": $branch, "inline": true },
                  { "name": "📝 Commit", "value": $commit_short, "inline": true },
                  { "name": "📁 Files Changed", "value": $files_changed, "inline": true },
                  { "name": "👤 Author", "value": $author, "inline": true },
                  { "name": "🔗 Compare", "value": $compare, "inline": true }
                ],
                "footer": { "text": $footer },
                "timestamp": $timestamp
              }]
            }')

          HTTP_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          if [ "$HTTP_RESPONSE" -eq 204 ]; then
            echo "✅ Discord notification sent!"
          else
            echo "❌ Failed. HTTP: $HTTP_RESPONSE"
            echo "📝 Debug Payload: $PAYLOAD" # Membantu melihat JSON yang gagal terkirim
            exit 1
          fi
